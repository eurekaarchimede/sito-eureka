# Aggiorna il feed Instagram del sito: ogni 3 ore scarica i post nuovi,
# rinnova il token Meta e committa assets/ig/feed.json + immagini.
# Esecuzione manuale: tab Actions → "aggiorna feed instagram" → Run workflow.
name: aggiorna feed instagram

on:
  workflow_dispatch: {}       # solo manuale — riattiva il cron quando hai il token Meta

permissions:
  contents: write

concurrency:
  group: ig-feed
  cancel-in-progress: false

jobs:
  feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: scarica post e rinnova token
        run: node scripts/fetch-ig.mjs
        env:
          ENC_KEY: ${{ secrets.ENC_KEY }}
          IG_TOKEN: ${{ secrets.IG_TOKEN }}

      - name: committa se c'è qualcosa di nuovo
        run: |
          git config user.name "ig-feed-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "nessuna novità"
          else
            git commit -m "feed instagram aggiornato"
            git pull --rebase origin main
            git push
          fi
